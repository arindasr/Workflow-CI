name: WeMovies CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v3

      - name: 2. Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: 3. Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 pandas scikit-learn

      - name: 4. Run MLflow Project
        run: |
          mlflow run MLProject --env-manager=local

      - name: 5. Get Latest Run ID
        id: get_run_id
        run: |
          RUN_ID=$(ls -t mlruns/0 | grep -v "meta.yaml" | head -n 1)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Berhasil mendapatkan Run ID: $RUN_ID"

      - name: 6. Upload Model to GitHub Artifacts (Syarat CI)
        uses: actions/upload-artifact@v4
        with:
          name: wemovies-model
          path: mlruns/0/${{ env.RUN_ID }}/artifacts/model

      - name: 7. Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 8. Build Docker Image (Fungsi mlflow build-docker)
        run: |
          mlflow models build-docker -m "mlruns/0/${{ env.RUN_ID }}/artifacts/model" -n "${{ secrets.DOCKER_USERNAME }}/wemovies-model:latest" --env-manager conda

      - name: 9. Push Docker Image ke Docker Hub
        run: |
          docker push "${{ secrets.DOCKER_USERNAME }}/wemovies-model:latest"